<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LegalKare - Book Appointment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/main.js" defer></script>
  <style>
    /* Flex container: Sidebar and main content side-by-side */
    .container {
      display: flex;
      min-height: 100vh;
    }
    /* Sidebar styling */
    .sidebar {
      width: 250px;
      background: #001F3F;
      color: #fff;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.2);
      border-right: 2px solid #D4AF37;
    }
    .sidebar h2 {
      font-size: 1.8rem;
      margin-bottom: 30px;
      text-align: center;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
    }
    .sidebar ul li {
      margin-bottom: 15px;
    }
    .sidebar ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      display: block;
      padding: 10px;
      border-radius: 5px;
      transition: background 0.3s ease;
    }
    .sidebar ul li a:hover,
    .sidebar ul li a.active {
      background: rgba(212,175,55,0.2);
    }
    /* Main Content styling */
    .main-content {
      flex: 1;
      padding: 40px;
      background: #F0F2F6;
      color: #333;
      overflow-y: auto;
    }
    .content {
      max-width: 1000px;
      margin: 0 auto;
    }
    /* Booking Container */
    .booking-container {
      background: #fff;
      border: 1px solid #D4AF37;
      border-radius: 5px;
      padding: 20px;
      margin-bottom: 40px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      color: #333;
    }
    .booking-container h1 {
      font-size: 2.5rem;
      color: #001F3F;
      margin-bottom: 20px;
      text-align: center;
    }
    .booking-container h3 {
      font-size: 1.8rem;
      color: #001F3F;
      margin-bottom: 15px;
    }
    .booking-container textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #D4AF37;
      border-radius: 5px;
      font-size: 1rem;
      background: #F0F2F6;
      color: #333;
      min-height: 80px;
      resize: vertical;
    }
    .booking-container form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .booking-container label {
      font-weight: 600;
      color: #001F3F;
    }
    .booking-container input,
    .booking-container select {
      width: 100%;
      padding: 10px;
      border: 1px solid #D4AF37;
      border-radius: 5px;
      font-size: 1rem;
      background: #F0F2F6;
      color: #333;
    }
    .booking-container button {
      padding: 10px;
      background: #001F3F;
      color: #fff;
      border: 2px solid #D4AF37;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
      width: 100%;
    }
    .booking-container button:hover {
      background: #002855;
    }
    #bookingSpinner {
      margin-top: 10px;
      font-size: 1rem;
      color: #001F3F;
      display: none;
    }
    /* Footer styling */
    footer {
      background: #001F3F;
      border-top: 1px solid #D4AF37;
      padding: 1rem;
      text-align: center;
      color: #fff;
      font-size: 0.9rem;
    }
  </style>
  <!-- Access control: Only allow clients to access this page -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const role = localStorage.getItem("role") ? localStorage.getItem("role").trim().toLowerCase() : "";
      if (role !== "client") {
        alert("Access denied. This page is only accessible to clients.");
        window.location.href = "login.html";
      }
    });
  </script>
  <!-- Optional: Remove lawyer-only links from the sidebar if present -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const role = localStorage.getItem("role") ? localStorage.getItem("role").trim().toLowerCase() : "";
      if (role === "client") {
        document.querySelectorAll("a.lawyer-only").forEach(link => link.parentElement.remove());
      }
    });
  </script>
</head>
<body>
  <div class="container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="logo-container">
        <a href="index.html">
          <img src="logo.png" alt="LegalKare Logo" class="logo">
        </a>
      </div>
      <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="book_appointment.html" class="active">Book Appointment</a></li>
        <li><a href="submit_review.html">Submit a review</a></li>
        <li><a href="faqs.html">FAQs</a></li>
        <li><a href="initiate_call.html">Online Consultation</a></li>
        <li><a href="#" onclick="handleLogout(); return false;">Logout</a></li>
      </ul>
    </aside>
    <!-- Main Content -->
    <div class="main-content">
      <div class="content">
        <div class="booking-container">
          <h1>Book an Appointment</h1>
          <!-- Lawyer Selection Section -->
          <div id="lawyerSelection">
            <h3>Find a Lawyer</h3>
            <textarea id="caseDetails" placeholder="Describe your case (optional)"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
              <button id="recommendBtn">Recommend a Lawyer</button>
              <button id="viewAllBtn">View All Lawyers</button>
            </div>
            <div id="lawyersList" style="margin-top:20px;"></div>
          </div>
          <!-- Appointment Booking Form (shown after a lawyer is selected) -->
          <div id="bookingFormSection" style="display:none;">
            <h3>Lawyer Details</h3>
            <div id="selectedLawyerDetails"></div>
            <hr>
            <h3>Book Appointment</h3>
            <form id="appointmentForm">
              <label for="appointmentDate">Select Date:</label>
              <input type="date" id="appointmentDate" required>
              <label for="timeSlot">Select Time Slot:</label>
              <select id="timeSlot" required>
                <option value="09:00-10:00">09:00-10:00</option>
                <option value="10:00-11:00">10:00-11:00</option>
                <option value="11:00-12:00">11:00-12:00</option>
                <option value="12:00-13:00">12:00-13:00</option>
                <option value="13:00-14:00">13:00-14:00</option>
                <option value="14:00-15:00">14:00-15:00</option>
                <option value="15:00-16:00">15:00-16:00</option>
                <option value="16:00-17:00">16:00-17:00</option>
                <option value="17:00-18:00">17:00-18:00</option>
              </select>
              <button type="submit">Book Appointment</button>
            </form>
            <div id="bookingSpinner">Booking...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer>
    © 2025 LegalKare. All rights reserved.
  </footer>
  <script>
    const API_BASE_URL = "http://127.0.0.1:5002";

    async function parseJsonOrThrow(response) {
      try {
        return await response.json();
      } catch (err) {
        throw new Error("Invalid JSON response.");
      }
    }

    async function fetchLawyers(endpoint, payload = {}) {
      try {
        const options = {
          method: endpoint === "view_all" ? "GET" : "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include"
        };
        if (endpoint === "recommend") {
          options.body = JSON.stringify(payload);
        }
        const url = endpoint === "view_all"
          ? `${API_BASE_URL}/profile/list_lawyers`
          : `${API_BASE_URL}/recommend_lawyer`;
        const response = await fetch(url, options);
        const result = await parseJsonOrThrow(response);
        if (response.ok && result.status === "success") {
          return endpoint === "view_all" ? result.lawyers : result.recommendations;
        } else {
          alert(result.message || "Failed to fetch lawyers.");
          return [];
        }
      } catch (err) {
        console.error(err);
        alert("Error fetching lawyers: " + err.message);
        return [];
      }
    }

    function displayLawyers(lawyers) {
      const lawyersListDiv = document.getElementById("lawyersList");
      lawyersListDiv.innerHTML = "";
      if (!lawyers || lawyers.length === 0) {
        lawyersListDiv.innerHTML = "<p>No lawyers found.</p>";
        return;
      }
      lawyers.forEach(lawyer => {
        const lawyerDiv = document.createElement("div");
        lawyerDiv.style.border = "1px solid #ddd";
        lawyerDiv.style.padding = "10px";
        lawyerDiv.style.marginBottom = "10px";
        lawyerDiv.style.cursor = "pointer";
        lawyerDiv.innerHTML = `
          <p><strong>${lawyer.name}</strong></p>
          <p>Location: ${lawyer.location || "N/A"}</p>
          <p>Specialization: ${lawyer.specialization || "N/A"}</p>
        `;
        lawyerDiv.onclick = () => {
          document.getElementById("lawyerSelection").style.display = "none";
          document.getElementById("bookingFormSection").style.display = "block";
          document.getElementById("selectedLawyerDetails").innerHTML = lawyerDiv.innerHTML;
          // Attempt to get the lawyer ID from various keys.
          const lawyerId = lawyer.user_id;
          if (!lawyerId) {
            alert("Selected lawyer has no valid lawyer ID.");
            return;
          }
          localStorage.setItem("selected_lawyer_id", lawyerId);
        };
        lawyersListDiv.appendChild(lawyerDiv);
      });
    }

    document.getElementById("recommendBtn").addEventListener("click", async () => {
      const caseDetails = document.getElementById("caseDetails").value.trim();
      if (!caseDetails) {
        alert("Please describe your case to get recommendations.");
        return;
      }
      const lawyers = await fetchLawyers("recommend", { case_details: caseDetails });
      displayLawyers(lawyers);
    });

    document.getElementById("viewAllBtn").addEventListener("click", async () => {
      const lawyers = await fetchLawyers("view_all");
      displayLawyers(lawyers);
    });

    document.getElementById("appointmentForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const selectedLawyerId = localStorage.getItem("selected_lawyer_id");
      if (!selectedLawyerId) {
        alert("No lawyer selected.");
        return;
      }
      const appointmentDate = document.getElementById("appointmentDate").value;
      const timeSlot = document.getElementById("timeSlot").value;
      if (!appointmentDate || !timeSlot) {
        alert("Please select both a date and a time slot.");
        return;
      }
      const bookingData = {
        lawyer_id: selectedLawyerId,
        date: appointmentDate,
        time_slot: timeSlot
      };
      console.log("Booking Data:", bookingData);
      document.getElementById("bookingSpinner").style.display = "block";
      try {
        const response = await fetch(`${API_BASE_URL}/profile/book_appointment`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(bookingData)
        });
        const result = await parseJsonOrThrow(response);
        document.getElementById("bookingSpinner").style.display = "none";
        if (response.ok && result.status === "success") {
          alert("Appointment booked successfully!");
        } else {
          alert("Failed to book appointment: " + (result.message || "Unknown error."));
        }
      } catch (err) {
        document.getElementById("bookingSpinner").style.display = "none";
        console.error(err);
        alert("Error booking appointment: " + err.message);
      }
    });
  </script>
  <script>
    async function handleLogout() {
      try {
        const response = await fetch(`${API_BASE_URL}/logout`, {
          method: "POST",
          credentials: "include"
        });
        if (response.ok) {
          alert("Logged out successfully!");
        } else {
          console.error("Logout failed with status", response.status);
        }
      } catch (err) {
        console.error("Error during logout:", err);
      }
      localStorage.removeItem("username");
      localStorage.removeItem("user_id");
      localStorage.removeItem("role");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
