<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LegalKare - Upload Document</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
  <style>
    /* Global Styles */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #202A44;
    }
    .container {
      display: flex;
      min-height: 100vh;
    }
    /* Sidebar Navigation (Dashboard structure) */
    .sidebar {
      width: 250px;
      background: #001F3F;
      color: #fff;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
      border-right: 2px solid #D4AF37;
    }
    .sidebar h2 {
      font-size: 1.8rem;
      margin-bottom: 30px;
      text-align: center;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
    }
    .sidebar ul li {
      margin-bottom: 15px;
    }
    .sidebar ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      display: block;
      padding: 10px;
      border-radius: 5px;
      transition: background 0.3s ease;
    }
    .sidebar ul li a:hover,
    .sidebar ul li a.active {
      background: rgba(212, 175, 55, 0.2);
    }
    /* Main Content Area */
    .main-content {
      flex: 1;
      padding: 40px;
      background: #fff;
      position: relative;
    }
    .main-content::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('images/illustration.svg') no-repeat center center / cover;
      opacity: 0.1;
      z-index: -1;
    }
    .content {
      position: relative;
      z-index: 1;
    }
    .content h1 {
      font-size: 2.5rem;
      color: #333;
      margin-bottom: 20px;
    }
    .content p {
      font-size: 1.2rem;
      color: #555;
    }
    /* Upload Form Container Styling (Glassmorphism) */
    .upload-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 2rem;
      max-width: 600px;
      margin: 40px auto;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    }
    .upload-container h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }
    .folder-group {
      margin-bottom: 1rem;
    }
    .folder-group label {
      font-weight: 600;
      display: block;
      margin-bottom: 5px;
      color: #333;
    }
    .folder-group input,
    .folder-group select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #D4AF37; /* Gold border */
      border-radius: 5px;
      font-size: 1rem;
      margin-bottom: 10px;
      background: #F0F2F6;
      color: #333;
    }
    /* Folder Option Section */
    .folder-option-group {
      margin-bottom: 1rem;
    }
    .folder-option-group label {
      font-weight: 600;
      display: block;
      margin-bottom: 5px;
      color: #333;
    }
    .folder-option-group select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #D4AF37;
      border-radius: 5px;
      font-size: 1rem;
      background: #F0F2F6;
      color: #333;
    }
    /* Submit Button */
    .upload-container button {
      width: 100%;
      padding: 0.75rem;
      background: #001F3F;
      color: #fff;
      border: 2px solid #D4AF37;
      border-radius: 5px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .upload-container button:hover {
      background: #001F3F;
    }
    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        text-align: center;
        border-right: none;
        border-bottom: 2px solid #D4AF37;
      }
      .sidebar ul li {
        margin-bottom: 10px;
      }
      .main-content {
        padding: 20px;
      }
    }
  </style>
</head>
<body onload="loadUploadPage()">
  <div class="container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="logo-container">
  <a href="index.html">
    <img src="logo.png" alt="LegalKare Logo" class="logo">
  </a>
</div>
      <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="upload_document.html" class="lawyer-only">Upload Document</a></li>
        <li><a href="documents.html" class="lawyer-only">Documents</a></li>
        <li><a href="appointments.html" class="lawyer-only">Appointments</a></li>
        <li><a href="notifications.html" class="lawyer-only">Notifications</a></li>
        <li><a href="teams.html" class="lawyer-only">Teams</a></li>
        <li><a href="judgement_search.html" class="lawyer-only">Judgement Search</a></li>
        <li><a href="court_documents.html" class="lawyer-only">Court Documents Generation</a></li>
       <li><a href="profile_reviews.html" class="lawyer-only">Profile Reviews</a></li>
        <li><a href="book_appointment.html" class="client-only">Book Appointment</a></li>
        <li><a href="submit_review.html" class="client-only">Submit a review</a></li>
        <li><a href="faqs.html" class="client-only">FAQs</a></li>
         <li><a href="initiate_call.html" class="client-only">Online consultation</a></li>
         <li><a href="lawyer_online_consultation.html" class="lawyer-only">Online consultation</a></li>
        <li><a href="#" onclick="handleLogout(); return false;">Logout</a></li>
      </ul>
    </aside>
    <!-- Main Content Area -->
    <div class="main-content">
      <div class="upload-container">
        <h2>Upload a Document</h2>
        <form id="uploadDocumentForm">
          <!-- Folder Option Dropdown -->
          <div class="folder-option-group">
            <label for="folderOption">Folder Option:</label>
            <select id="folderOption" name="folderOption">
              <option value="existing" selected>Select Existing Folder</option>
              <option value="new">Create New Folder</option>
            </select>
          </div>
          <!-- Existing Folder Dropdown (populated from API) -->
          <div class="folder-group" id="existingFolderContainer">
            <label for="existingFolder">Existing Folder:</label>
            <select id="existingFolder" name="existingFolder">
              <!-- Options will be populated dynamically -->
            </select>
          </div>
          <!-- New Folder Input -->
          <div class="folder-group" id="newFolderContainer" style="display: none;">
            <label for="newFolder">New Folder Name:</label>
            <input type="text" id="newFolder" name="newFolder" placeholder="Enter new folder name">
          </div>
          <!-- Folder Hierarchy Inputs (Optional additional folder levels) -->
          <div class="folder-group">
            <label for="subFolder">Sub Folder (optional):</label>
            <input type="text" id="subFolder" name="subFolder" placeholder="e.g., 2025">
          </div>
          <div class="folder-group">
            <label for="subSubFolder">Sub-Sub Folder (optional):</label>
            <input type="text" id="subSubFolder" name="subSubFolder" placeholder="e.g., Signed">
          </div>
          <!-- File Upload Input -->
          <div class="folder-group">
            <label for="fileUpload">Select File:</label>
            <!-- Changed name attribute to "file" so backend can detect it -->
            <input type="file" id="fileUpload" name="file" required>
          </div>
          <button type="submit">Upload Document</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      console.log("DOM fully loaded.");

      // Toggle folder option: existing vs new
      const folderOption = document.getElementById('folderOption');
      const existingFolderContainer = document.getElementById('existingFolderContainer');
      const newFolderContainer = document.getElementById('newFolderContainer');

      folderOption.addEventListener('change', function() {
        console.log("Folder option changed:", this.value);
        if (this.value === 'existing') {
          existingFolderContainer.style.display = 'block';
          newFolderContainer.style.display = 'none';
        } else if (this.value === 'new') {
          existingFolderContainer.style.display = 'none';
          newFolderContainer.style.display = 'block';
        }
      });

      // Fetch existing folders from the API endpoint with credentials included.
      fetch('http://127.0.0.1:5002/folders', { credentials: 'include' })
        .then(response => {
          console.log("API response status:", response.status);
          return response.json();
        })
        .then(data => {
          console.log("Folders fetched:", data);
          if (data.status === 'success') {
            const folderSelect = document.getElementById('existingFolder');
            folderSelect.innerHTML = ''; // Clear any pre-existing options
            if (data.folders && data.folders.length > 0) {
              data.folders.forEach(folder => {
                const option = document.createElement('option');
                option.value = folder;
                option.textContent = folder;
                folderSelect.appendChild(option);
              });
            } else {
              // If no folders exist, display a placeholder option.
              const option = document.createElement('option');
              option.value = '';
              option.textContent = 'No folders available';
              folderSelect.appendChild(option);
            }
          } else {
            console.error("Error fetching folders:", data.message);
          }
        })
        .catch(error => {
          console.error("Error fetching folders:", error);
        });

      // Prevent default form submission and send AJAX POST request.
      const uploadForm = document.getElementById('uploadDocumentForm');
      uploadForm.addEventListener('submit', function(e) {
        e.preventDefault();
        console.log("Upload button clicked. Starting file upload.");

        const formData = new FormData(uploadForm);

        fetch('http://127.0.0.1:5002/upload', {
          method: 'POST',
          body: formData,
          credentials: 'include'
        })
        .then(response => {
          console.log("Upload API response status:", response.status);
          return response.json();
        })
        .then(data => {
          console.log("Upload response:", data);
          if (data.status === 'success') {
            alert("File uploaded successfully!");
          } else {
            alert("Upload failed: " + data.message);
          }
        })
        .catch(error => {
          console.error("Error during upload:", error);
          alert("An error occurred during file upload.");
        });
      });
    });
  </script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const role = localStorage.getItem("role") ? localStorage.getItem("role").trim().toLowerCase() : "";
    // If the user is not a lawyer, remove all lawyer-only nav items.
    if (role !== "lawyer") {
      document.querySelectorAll("a.lawyer-only").forEach(link => {
        link.parentElement.remove();
      });
    }
    // Similarly, if you need to remove client-only items for lawyers:
    if (role === "lawyer") {
      document.querySelectorAll("a.client-only").forEach(link => {
        link.parentElement.remove();
      });
    }
  });
</script>
</body>
</html>
