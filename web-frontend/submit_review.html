<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LegalKare - Submit Review</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/main.js" defer></script>
  <style>
    /* Flex container: Sidebar and main content side-by-side */
    .container {
      display: flex;
      min-height: 100vh;
    }
    /* Sidebar styling (client navigation) */
    .sidebar {
      width: 250px;
      background: #001F3F;
      color: #fff;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.2);
      border-right: 2px solid #D4AF37;
    }
    .sidebar h2 {
      font-size: 1.8rem;
      margin-bottom: 30px;
      text-align: center;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
    }
    .sidebar ul li {
      margin-bottom: 15px;
    }
    .sidebar ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      display: block;
      padding: 10px;
      border-radius: 5px;
      transition: background 0.3s ease;
    }
    .sidebar ul li a:hover,
    .sidebar ul li a.active {
      background: rgba(212,175,55,0.2);
    }
    /* Main Content styling */
    .main-content {
      flex: 1;
      padding: 40px;
      background: #F0F2F6;
      color: #333;
      overflow-y: auto;
    }
    .content {
      max-width: 1000px;
      margin: 0 auto;
    }
    /* Review form container */
    .review-container {
      background: #fff;
      border: 1px solid #D4AF37;
      border-radius: 5px;
      padding: 20px;
      margin-bottom: 40px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      color: #333;
    }
    .review-container h1 {
      font-size: 2.5rem;
      color: #001F3F;
      margin-bottom: 20px;
      text-align: center;
    }
    .review-container form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .review-container label {
      font-weight: 600;
      color: #001F3F;
    }
    .review-container input[type="text"],
    .review-container textarea,
    .review-container input[type="range"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #D4AF37;
      border-radius: 5px;
      font-size: 1rem;
      background: #F0F2F6;
      color: #333;
    }
    .review-container textarea {
      min-height: 100px;
      resize: vertical;
    }
    .review-container button {
      padding: 10px;
      background: #001F3F;
      color: #fff;
      border: 2px solid #D4AF37;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
      width: 100%;
    }
    .review-container button:hover {
      background: #002855;
    }
    #reviewSpinner {
      margin-top: 10px;
      font-size: 1rem;
      color: #001F3F;
      display: none;
    }
    /* Footer styling */
    footer {
      background: #001F3F;
      border-top: 1px solid #D4AF37;
      padding: 1rem;
      text-align: center;
      color: #fff;
      font-size: 0.9rem;
    }
  </style>
  <!-- Access control: Only allow clients to access this page -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const role = localStorage.getItem("role") ? localStorage.getItem("role").trim().toLowerCase() : "";
      if (role !== "client") {
        alert("Access denied. This page is only accessible to clients.");
        window.location.href = "login.html";
      }
    });
  </script>
</head>
<body>
  <div class="container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="logo-container">
        <a href="index.html">
          <img src="logo.png" alt="LegalKare Logo" class="logo">
        </a>
      </div>
      <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="book_appointment.html">Book Appointment</a></li>
        <li><a href="submit_review.html" class="active">Submit a review</a></li>
        <li><a href="faqs.html">FAQs</a></li>
        <li><a href="initiate_call.html">Online Consultation</a></li>
        <li><a href="#" onclick="handleLogout(); return false;">Logout</a></li>
      </ul>
    </aside>
    <!-- Main Content -->
    <div class="main-content">
      <div class="content">
        <div class="review-container">
          <h1>Submit a Review</h1>
          <form id="reviewForm">
            <label for="lawyerId">Lawyer ID:</label>
            <input type="text" id="lawyerId" name="lawyerId" placeholder="Enter your lawyer's ID" required>
            <label for="reviewText">Review:</label>
            <textarea id="reviewText" name="reviewText" placeholder="Write your review here" required></textarea>
            <label for="rating">Rating (1 to 5):</label>
            <input type="range" id="rating" name="rating" min="1" max="5" value="3" oninput="document.getElementById('ratingValue').textContent = this.value">
            <span id="ratingValue">3</span>
            <button type="submit">Submit Review</button>
          </form>
          <div id="reviewSpinner">Submitting review...</div>
        </div>
      </div>
    </div>
  </div>
  <footer>
    © 2025 LegalKare. All rights reserved.
  </footer>
  <script>
    const API_BASE_URL = "http://127.0.0.1:5002";

    async function parseJsonOrThrow(response) {
      try {
        return await response.json();
      } catch (err) {
        throw new Error("Invalid JSON response.");
      }
    }

    document.getElementById("reviewForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const lawyerId = document.getElementById("lawyerId").value.trim();
      const reviewText = document.getElementById("reviewText").value.trim();
      const rating = document.getElementById("rating").value;
      if (!lawyerId || !reviewText) {
        alert("Please fill in all fields.");
        return;
      }
      // Retrieve client ID from localStorage using the key "user_id"
      const clientId = localStorage.getItem("user_id") || localStorage.getItem("client_id");
      console.log("Client ID:", clientId);
      if (!clientId || clientId === "undefined") {
        alert("Client ID not found. Please log in again.");
        window.location.href = "login.html";
        return;
      }
      const reviewData = {
        lawyer_id: lawyerId,
        client_id: clientId,
        review: reviewText,
        rating: rating
      };
      console.log("Review Data:", reviewData);
      document.getElementById("reviewSpinner").style.display = "block";
      try {
        const response = await fetch(`${API_BASE_URL}/add_review`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(reviewData)
        });
        const result = await parseJsonOrThrow(response);
        document.getElementById("reviewSpinner").style.display = "none";
        if (result.status === "success") {
          alert("Your review has been submitted successfully!");
          document.getElementById("reviewForm").reset();
          document.getElementById("ratingValue").textContent = "3";
        }
      } catch (err) {
        document.getElementById("reviewSpinner").style.display = "none";
        console.error(err);
        alert("Error submitting review: " + err.message);
      }
    });
  </script>
  <script>
    async function handleLogout() {
      try {
        const response = await fetch(`${API_BASE_URL}/logout`, {
          method: "POST",
          credentials: "include"
        });
        if (response.ok) {
          alert("Logged out successfully!");
        } else {
          console.error("Logout failed with status", response.status);
        }
      } catch (err) {
        console.error("Error during logout:", err);
      }
      localStorage.removeItem("username");
      localStorage.removeItem("user_id");
      localStorage.removeItem("role");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
